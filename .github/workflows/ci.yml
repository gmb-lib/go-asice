# CI for a Go library: build · vet · golangci-lint · govulncheck · race tests +
# coverage, plus a short fuzz sweep over any Fuzz* targets. Publishing happens on
# a GitHub release (release.yml), not here, so there is no image job.
name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod          # single source of truth
          cache: true
          cache-dependency-path: go.sum

      - run: go mod download
      - run: go mod verify
      - run: go mod tidy -diff

      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@d583c34f0599d37dbac4a198b9c83201be380893 # v9.3.0
        with:
          version: v2.12.2

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Test (race + coverage)
        run: go test -race -count=1 -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4   # pin to the current v4 commit SHA
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

  # Short fuzz sweep — every Fuzz* target runs 30s so an untrusted-input parser
  # never regresses to a panic. No-op when the module has no fuzz targets.
  fuzz-short:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum
      - name: Fuzz (30s per target)
        run: |
          targets=$(go test -list '^Fuzz' ./... 2>/dev/null | grep '^Fuzz' || true)
          for t in $targets; do
            go test -run '^$' -fuzz "^${t}\$" -fuzztime 30s ./...
          done
